name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
            artifact_name: buaa-checkin
            asset_name: buaa-checkin-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
            artifact_name: buaa-checkin
            asset_name: buaa-checkin-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            artifact_name: buaa-checkin.exe
            asset_name: buaa-checkin-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
            artifact_name: buaa-checkin
            asset_name: buaa-checkin-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
            artifact_name: buaa-checkin
            asset_name: buaa-checkin-macos-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Assets
        run: |
          mkdir -p release_assets
          for dir in artifacts/*; do
            if [ -d "$dir" ]; then
              cp "$dir"/* release_assets/
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true
